packages:
  - "frontend"
  - "backend"
  - "shared/*"
allowBuilds:
  '@nestjs/core': set this to true or false
  '@prisma/client': true
  '@prisma/engines': set this to true or false
  core-js: set this to true or false
  core-js-pure: set this to true or false
  esbuild: true
  msgpackr-extract: set this to true or false
  prisma: true
  sharp: true
  unrs-resolver: set this to true or false
